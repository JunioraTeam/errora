# Backend web tier — Django served by gunicorn (errora.wsgi:application).
# Migrations are NOT run here; they run once via backend-migrate-job.yaml.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: errora
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: errora
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: errora
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: errora
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: errora
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/part-of: errora
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: errora
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: backend
          image: errora/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["gunicorn", "errora.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: errora-config
            - secretRef:
                name: errora-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
