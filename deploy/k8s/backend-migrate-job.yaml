# One-shot migration job. Run BEFORE rolling out / upgrading the backend.
#
#   kubectl -n errora apply -f backend-migrate-job.yaml
#   kubectl -n errora wait --for=condition=complete job/errora-migrate --timeout=300s
#
# Re-running: delete the old job first (Jobs are immutable):
#   kubectl -n errora delete job errora-migrate --ignore-not-found
apiVersion: batch/v1
kind: Job
metadata:
  name: errora-migrate
  namespace: errora
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: errora
    app.kubernetes.io/component: migrate
spec:
  backoffLimit: 3
  # Auto-clean finished jobs after 1h (requires TTL controller, default on 1.23+).
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: errora
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: migrate
          image: errora/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: errora-config
            - secretRef:
                name: errora-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
