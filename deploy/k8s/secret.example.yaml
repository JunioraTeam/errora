# =============================================================================
# TEMPLATE ONLY — DO NOT COMMIT REAL SECRETS.
#
# This file documents the keys the application expects. The placeholder values
# below are NOT valid. In real environments, create the Secret out-of-band so
# secret material never lands in git, e.g.:
#
#   kubectl -n errora create secret generic errora-secrets \
#     --from-literal=SECRET_KEY="$(openssl rand -base64 48)" \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 48)" \
#     --from-literal=SECRETS_ENCRYPTION_KEY="$(python -c 'from cryptography.fernet import Fernet;print(Fernet.generate_key().decode())')" \
#     --from-literal=DATABASE_URL="postgres://errora:CHANGEME@postgres:5432/errora" \
#     --from-literal=POSTGRES_PASSWORD="CHANGEME" \
#     --from-literal=KAVENEGAR_API_KEY="..." \
#     --from-literal=OPENAI_API_KEY="..." \
#     --from-literal=ANTHROPIC_API_KEY="..."
#
# Or manage it with an external secrets operator / sealed-secrets.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: errora-secrets
  namespace: errora
  labels:
    app.kubernetes.io/name: errora
    app.kubernetes.io/part-of: errora
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # Django / auth
  SECRET_KEY: "REPLACE_ME_django_secret_key"
  JWT_SECRET: "REPLACE_ME_jwt_secret"
  # Fernet key (base64, 32 bytes) used to encrypt stored integration secrets.
  SECRETS_ENCRYPTION_KEY: "REPLACE_ME_fernet_key"
  # Datastores — DATABASE_URL embeds the Postgres password.
  DATABASE_URL: "postgres://errora:REPLACE_ME@postgres:5432/errora"
  # Consumed by the Postgres StatefulSet (postgres.yaml).
  POSTGRES_PASSWORD: "REPLACE_ME_postgres_password"
  # Third-party providers
  KAVENEGAR_API_KEY: "REPLACE_ME_kavenegar_api_key"
  OPENAI_API_KEY: "REPLACE_ME_openai_api_key"
  ANTHROPIC_API_KEY: "REPLACE_ME_anthropic_api_key"
