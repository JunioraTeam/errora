# =============================================================================
# Errora — single-host stack built from the ONE merged image (root Dockerfile).
#
#   docker compose up --build           # http://localhost (port 80)
#
# The `app` container runs the whole application behind nginx (gunicorn web,
# Next.js, celery worker, celery beat — all supervised). Only the datastores
# run alongside it.
#
# Config comes from environment. Copy secrets into a `.env` file next to this
# compose file; the inline `environment:` block wires service DNS + defaults.
#
# NEXT_PUBLIC_API_URL is inlined into the client bundle at BUILD time. Leave it
# EMPTY for this single-origin setup — the client falls back to the page's own
# origin at runtime, so the same image works on any domain. Set it only when the
# API is served from a different origin than the frontend.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application — merged image: nginx + gunicorn + next.js + celery (supervisor).
  # Entrypoint runs DB migrations, then hands off to supervisord.
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
    image: errora/app:${ERRORA_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # --- Core ---
      DEBUG: "${DEBUG:-0}"
      SECRET_KEY: "${SECRET_KEY:-dev-insecure-change-me}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-*}"
      SITE_URL: "${SITE_URL:-http://localhost}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost}"
      LANGUAGE_CODE: "${LANGUAGE_CODE:-fa}"
      # --- Datastores (compose service DNS names) ---
      DATABASE_URL: "${DATABASE_URL:-postgres://errora:errora@db:5432/errora}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      # --- Process tuning (consumed by supervisord program defs) ---
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-4}"
      CELERY_CONCURRENCY: "${CELERY_CONCURRENCY:-4}"
      # --- Secrets / integrations (override in .env) ---
      SECRETS_ENCRYPTION_KEY: "${SECRETS_ENCRYPTION_KEY:-}"
      JWT_SECRET: "${JWT_SECRET:-}"
      KAVENEGAR_API_KEY: "${KAVENEGAR_API_KEY:-}"
      AI_DEFAULT_PROVIDER: "${AI_DEFAULT_PROVIDER:-claude}"
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Postgres
  # ---------------------------------------------------------------------------
  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-errora}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-errora}"
      POSTGRES_DB: "${POSTGRES_DB:-errora}"
    volumes:
      # pg18+ images store data in a major-version subdir; mount the parent.
      - pgdata:/var/lib/postgresql
    ports:
      # Loopback only (local psql access, not the host's public ifaces).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-errora} -d ${POSTGRES_DB:-errora}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis (Celery broker + result backend + Django cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    ports:
      # Loopback only.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
  redisdata:
