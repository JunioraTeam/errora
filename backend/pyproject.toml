[project]
name = "errora"
version = "0.1.0"
description = "Errora (ارورا) — exception tracking & performance monitoring platform"
requires-python = ">=3.12"
dependencies = [
    "Django>=6.0",
    "djangorestframework>=3.16",
    "adrf>=0.1.9",
    "django-environ>=0.11",
    "django-cors-headers>=4.4",
    "django-filter>=24.3",
    "psycopg[binary]>=3.2",
    "mysqlclient>=2.2.8",
    "celery>=5.4",
    "redis>=5.1",
    "hiredis>=3.0",
    "drf-spectacular>=0.27",
    "PyJWT>=2.9",
    "cryptography>=43.0",
    "requests>=2.32",
    "httpx>=0.28",
    "python-gitlab>=4.13",
    "openai>=1.50",
    "anthropic>=0.39",
    "claude-agent-sdk>=0.2.110",
    "cursor-sdk>=0.1.8",
    "msgpack>=1.1",
    "clickhouse-connect>=1.3.0",
    "gunicorn>=23.0",
    "uvicorn>=0.32",
    "whitenoise>=6.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-django>=4.9",
    "pytest-cov>=5.0",
    "factory-boy>=3.3",
    "freezegun>=1.5",
    "responses>=0.25",
    "ruff>=0.7",
    "mypy>=1.13",
]

[tool.ruff]
line-length = 100
target-version = "py312"
# Migrations are auto-generated; don't lint their import order / style.
extend-exclude = ["**/migrations/**"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ", "ASYNC"]
# DJ008 (__str__ on every model) and DJ012 (member ordering) are too pedantic for
# through/log models; keep them off project-wide.
ignore = ["DJ008", "DJ012"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "errora.settings"
python_files = ["test_*.py", "tests.py"]
addopts = "--reuse-db"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
