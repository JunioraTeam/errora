# =============================================================================
# Errora — production single-host stack using the MERGED app image.
#
#   docker compose -f docker-compose.prod.yaml up --build -d
#
# One `app` container serves the whole stack behind nginx (port 80); only the
# datastores run alongside it. Put real secrets in `.env` (same dir).
#
# NOTE: NEXT_PUBLIC_API_URL is baked into the client bundle at BUILD time. Leave
# it EMPTY (default) for the merged single-origin deployment — the client uses
# window.location.origin at runtime, so the same image works on any domain. Set
# it only if the API runs on a different origin. TLS terminates upstream (LB /
# reverse proxy / ingress); this stack speaks plain HTTP on :80.
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
    image: errora/app:${ERRORA_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-*}"
      DATABASE_URL: "${DATABASE_URL:-postgres://errora:errora@db:5432/errora}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-4}"
      CELERY_CONCURRENCY: "${CELERY_CONCURRENCY:-4}"
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-errora}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-errora}"
      POSTGRES_DB: "${POSTGRES_DB:-errora}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-errora} -d ${POSTGRES_DB:-errora}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
  redisdata:
