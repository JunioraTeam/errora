# =============================================================================
# Errora — front nginx for the merged container. Routes one public origin to
# the Django (gunicorn) and Next.js upstreams running inside the same image.
# TLS is expected to terminate upstream (LB / ingress); this listens on :80.
# =============================================================================

user  www-data;
worker_processes  auto;
pid  /run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging (to stdout/stderr so docker captures it) ---
    access_log  /dev/stdout;
    error_log   /dev/stderr  warn;

    # --- Performance ---
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    server_tokens       off;

    # Sentry SDKs POST event envelopes; allow headroom over the largest payload.
    client_max_body_size 25m;
    client_body_buffer_size 256k;

    # --- Compression (dynamic). Static is served pre-compressed via gzip_static. ---
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      application/xml application/xml+rss text/javascript
                      image/svg+xml application/wasm;

    # --- Upstreams (loopback; supervisor keeps them alive) ---
    upstream errora_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }
    upstream errora_frontend {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # Honour an externally-set X-Forwarded-Proto (from the TLS-terminating LB);
    # fall back to the scheme nginx saw. Django reads this for secure cookies etc.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        # Forwarded headers inherited by all locations below.
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Connection        "";          # reuse upstream keepalive
        proxy_read_timeout 120s;

        # ---- Django collected static (hashed manifest names -> immutable) ----
        location /static/ {
            alias /app/backend/staticfiles/;
            access_log off;
            expires    1y;
            add_header  Cache-Control "public, immutable";
            gzip_static on;                # serve .gz produced by whitenoise/manifest
            try_files  $uri @backend;      # fall back for any non-collected path
        }

        # ---- Backend dynamic routes ----
        location /api/    { proxy_pass http://errora_backend; }
        location /admin/  { proxy_pass http://errora_backend; }
        location = /healthz { proxy_pass http://errora_backend; access_log off; }
        location = /mcp   { proxy_pass http://errora_backend; }

        # AI/streaming (SSE) endpoints need buffering off + long read timeout.
        location /api/v1/ai/ {
            proxy_pass http://errora_backend;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 1h;
        }

        location @backend { proxy_pass http://errora_backend; }

        # ---- Next.js: immutable build assets get a long cache, rest proxied ----
        location /_next/static/ {
            proxy_pass http://errora_frontend;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass http://errora_frontend;
        }
    }
}
